<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" href="logo.png">
    <meta charset="UTF-8">
    <title>Production Distributeurs - Gang Of Pizza</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: auto; background-color: #EE5541; color: #333; }
        h1 { text-align: center; color: #ffffff; margin-bottom: 20px; }
        h2 { color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 5px; margin-top: 0; font-size: 1.2em; }
        #formulaire-distributeurs { display: flex; flex-wrap: wrap; gap: 15px; }
        .distributeur-card { flex: 1; min-width: 280px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { padding: 8px 5px; text-align: left; border-bottom: 1px solid #ddd; vertical-align: middle; }
        th { background-color: #f8f8f8; }
        .input-group { display: flex; align-items: center; gap: 3px; justify-content: center; }
        .btn-qty { background-color: #eee; border: 1px solid #ccc; width: 28px; height: 28px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; color: #333; }
        input[type="number"] { width: 45px; height: 24px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-weight: bold; }
        button.btn-calculer { display: block; width: 100%; padding: 15px; background-color: #ffffff; color: #EE5541; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-secondary { display: block; width: 100%; padding: 10px; background-color: #f8f8f8; color: #333; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-dark { background-color: #333 !important; color: white !important; }
        .resultats-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 30px; display: none; }
        .flex-row { display: flex; gap: 20px; margin-top: 15px; }
        .flex-col { flex: 1; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px dotted #ccc; }
        .highlight { font-weight: bold; color: #d32f2f; }
        .checklist-item label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .checklist-item input:checked + span { text-decoration: line-through; color: #999; }
        #zone-alertes { background-color: #ffcccc; color: #b30000; padding: 15px; border-radius: 6px; display: none; margin-bottom: 15px; font-weight: bold; }
        
        /* Nouveaux styles pour la page de connexion */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #EE5541;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
        #app-content { display: none; } /* Cache l'application au départ */

        @media print {
            body { background-color: white; font-size: 11pt; color: black; max-width: 100%; }
            h1, #formulaire-distributeurs, button, #btn-sync, #btn-history, #btn-reset { display: none !important; }
            .resultats-container { display: block !important; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="logo.png" alt="Logo Gang Of Pizza" style="max-width: 250px; margin-bottom: 30px;">
        <h1 style="color: white; margin-top: 0; font-size: 28px;">Espace Production</h1>
        <input type="password" id="input-mdp" placeholder="Code d'accès..." style="padding: 15px; font-size: 20px; border-radius: 8px; border: none; text-align: center; width: 80%; max-width: 300px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <button onclick="verifierMotDePasse()" style="padding: 15px 40px; font-size: 20px; font-weight: bold; background-color: #333; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">Valider</button>
        <p id="login-error" style="color: #fff; background-color: #b30000; padding: 10px 20px; border-radius: 6px; font-weight: bold; display: none; margin-top: 20px;">❌ Code incorrect</p>
    </div>

    <div id="app-content">
        <img src="logo.png" alt="Logo" style="max-width: 200px; display: block; margin: 0 auto 10px auto;">
        <h1>Logiciel de production 🍕</h1>
        <div id="formulaire-distributeurs"></div>
        <button id="btn-sync" class="btn-calculer btn-dark" onclick="synchroniserStocks()">🔄 Synchroniser les stocks Adial</button>
        <button class="btn-calculer" onclick="calculerProductionGlobale()">Calculer la production totale</button>
        <button id="btn-reset" class="btn-secondary" onclick="reinitialiserStocks()">♻️ Remise à zéro des stocks</button>

        <div class="resultats-container" id="zone-resultats">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d32f2f;">
                <h2 style="border:none;">📊 Bilan</h2>
                <button onclick="imprimerPDF()" style="padding:8px; cursor:pointer; font-weight:bold;">🖨️ Imprimer</button>
            </div>
            <p id="date-production" style="text-align:center; font-weight:bold;"></p>
            <div id="zone-alertes"></div>
            <div class="flex-row">
                <div class="flex-col"><h3>🍕 Pizzas</h3><ul id="liste-pizzas-totales"></ul></div>
                <div class="flex-col"><h3>🛒 Ingrédients</h3><div id="liste-ingredients"></div></div>
            </div>
            <h3>🚚 Détail par machine</h3>
            <div id="liste-repartition"></div>
        </div>
    </div>

    <script>
        // Le mot de passe a été retiré d'ici pour être géré par la nouvelle page
        const distributeurs = ["BOURG-SAINT-ANDÉOL", "LE TEIL", "TRICASTIN"];
        const recettes = {
            "4 Fromages Rouge": {"Disque tomaté": 1, "Roquefort (g)": 15, "Emmental râpé (g)": 30, "Scalarella (g)": 80, "Chèvre (tranches)": 6, "Olives noires (unités)": 3},
            "Burger": {"Disque tomaté": 1, "Oignons pré-frits (g)": 20, "Egrené au boeuf (g)": 70, "Sauce burger (g)": 25, "Cornichons (rondelles)": 7, "Scalarella + Cheddar (g)": 110},
            "Camembert Rôti": {"Disque crémé": 1, "Camembert (demi)": 1, "Allumettes fumées (g)": 40, "Scalarella (g)": 60},
            "Cannibale": {"Disque tomaté": 1, "Merguez (rondelles)": 15, "Poulet rôti (g)": 30, "Egrené au boeuf (g)": 40, "Sauce hot BBQ (g)": 18, "Scalarella (g)": 110},
            "Chèvre Miel": {"Disque crémé": 1, "Scalarella (g)": 120, "Miel (g)": 20, "Chèvre (tranches)": 8, "Olives noires (unités)": 3},
            "Croq'": {"Disque crémé": 1, "Jambon (g)": 60, "Sauce fromagère (g)": 25, "Scalarella (g)": 60, "Emmental râpé (g)": 30},
            "Extrême Nutella": {"Disque crémé": 1, "Nutella (g)": 90, "M&M's (unités)": 8},
            "Franc Comtoise": {"Disque crémé": 1, "Pommes de terre (g)": 60, "Saucisses fumées (g)": 50, "Allumettes fumées (g)": 20, "Oignons pré-frits (g)": 15, "Comté râpé (g)": 30, "Scalarella (g)": 90, "Olives noires (unités)": 3},
            "Indiana": {"Disque crémé": 1, "Epices curry (g)": 3, "Poulet rôti (g)": 80, "Sauce curry (g)": 15, "Poivrons grillés (g)": 30, "Scalarella (g)": 110, "Olives noires (unités)": 3},
            "Margarita": {"Disque tomaté": 1, "Emmental râpé (g)": 20, "Scalarella (g)": 70},
            "Maxi Kebab": {"Disque crémé": 1, "Epices kebab (g)": 2, "Viande kebab (g)": 120, "Sauce blanche (g)": 25, "Scalarella (g)": 120, "Tomates confites (demi-tomates)": 5, "Olives noires (unités)": 3},
            "Reine": {"Disque tomaté": 1, "Jambon (g)": 60, "Emmental râpé (g)": 30, "Scalarella (g)": 80, "Olives noires (unités)": 3},
            "Savoyarde": {"Disque crémé": 1, "Pommes de terre (g)": 60, "Oignons pré-frits (g)": 20, "Allumettes fumées (g)": 50, "Scalarella (g)": 90, "Reblochon (demi)": 5},
            "Ultimatum": {"Disque crémé": 1, "Pommes de terre (g)": 70, "Roquefort (g)": 15, "Egrené au boeuf (g)": 50, "Scalarella (g)": 90}
        };
        const listePizzas = Object.keys(recettes);

        // --- GESTION DE LA CONNEXION ---
        function verifierMotDePasse() {
            const input = document.getElementById('input-mdp').value;
            if (input === "123456") {
                document.getElementById('login-screen').style.display = 'none'; // Cache l'écran de verrouillage
                document.getElementById('app-content').style.display = 'block'; // Affiche le logiciel
                initialiserApp(); // Charge les distributeurs
            } else {
                document.getElementById('login-error').style.display = 'block'; // Affiche l'erreur
                document.getElementById('input-mdp').value = ''; // Vide la case
            }
        }

        // Permet de valider avec la touche "Entrée"
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("input-mdp").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    verifierMotDePasse();
                }
            });
        });
        // -------------------------------

        function modifierQte(id, delta) { let i = document.getElementById(id); i.value = Math.max(0, (parseInt(i.value) || 0) + delta); }

        function initialiserApp() {
            const cont = document.getElementById("formulaire-distributeurs");
            distributeurs.forEach((d, mIdx) => {
                let h = `<div class="distributeur-card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>📍 ${d}</h2>
                        <button class="btn-secondary" style="width: auto; margin: 0; padding: 5px 10px; font-size: 12px; cursor: pointer;" onclick="copierObjectifs(${mIdx})">📋 Copier pour tous</button>
                    </div>
                    <table><tr><th>Recette</th><th>Stock Actuel</th><th>Objectif</th></tr>`;
                listePizzas.forEach((p, pIdx) => {
                    let sO = localStorage.getItem(`obj_${mIdx}_${pIdx}`) || 0;
                    h += `<tr><td><strong>${p}</strong></td><td><div class="input-group"><button class="btn-qty" onclick="modifierQte('stock_${mIdx}_${pIdx}',-1)">-</button><input type="number" id="stock_${mIdx}_${pIdx}" value="0"><button class="btn-qty" onclick="modifierQte('stock_${mIdx}_${pIdx}',1)">+</button></div></td><td><div class="input-group"><button class="btn-qty" onclick="modifierQte('obj_${mIdx}_${pIdx}',-1)">-</button><input type="number" id="obj_${mIdx}_${pIdx}" value="${sO}"><button class="btn-qty" onclick="modifierQte('obj_${mIdx}_${pIdx}',1)">+</button></div></td></tr>`;
                });
                cont.innerHTML += h + `</table></div>`;
            });
        }

        function copierObjectifs(sourceIdx) {
            if(!confirm(`Copier les objectifs de ${distributeurs[sourceIdx]} vers TOUS les autres distributeurs ?`)) return;
            listePizzas.forEach((p, pIdx) => {
                let valeurACopier = document.getElementById(`obj_${sourceIdx}_${pIdx}`).value;
                distributeurs.forEach((d, targetIdx) => {
                    if(targetIdx !== sourceIdx) {
                        document.getElementById(`obj_${targetIdx}_${pIdx}`).value = valeurACopier;
                        localStorage.setItem(`obj_${targetIdx}_${pIdx}`, valeurACopier);
                    }
                });
            });
        }

        async function synchroniserStocks() {
            const btn = document.getElementById('btn-sync');
            btn.innerHTML = "⏳ Téléchargement et filtrage..."; btn.disabled = true;
            
            const groupId = "gelbAAyLaWy0KDfVsfH8ftlxAU6g90T3OrWWcFrCgVE";
            const proxyUrl = "https://solitary-recipe-92bd.clement-labarriere.workers.dev";

            try {
                const rS = await fetch(`${proxyUrl}/groups/${groupId}/stocks`);
                const rA = await fetch(`${proxyUrl}/apds/`);
                let rP = await fetch(`${proxyUrl}/pizzas/`);
                if (!rP.ok) rP = await fetch(`${proxyUrl}/pizzas`);

                const dS = await rS.json(), dA = await rA.json(), dP = await rP.json();
                
                let dictA = {}, dictP = {};
                (dA.apds || dA).forEach(m => dictA[m.id] = m.name);
                (dP.pizzas || dP).forEach(p => dictP[p.id] = p.pizzaName);
                
                let counts = {};
                const now = Date.now();
                
                (dS.stocks || []).forEach(it => {
                    if(it.pizzaId && it.locationUsed === true && it.expiryDate > now) {
                        let m = dictA[it.apdId], p = dictP[it.pizzaId];
                        if(m && p) { if(!counts[m]) counts[m] = {}; counts[m][p] = (counts[m][p] || 0) + 1; }
                    }
                });
                
                const norm = s => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "";
                distributeurs.forEach((d, mIdx) => {
                    listePizzas.forEach((p, pIdx) => document.getElementById(`stock_${mIdx}_${pIdx}`).value = 0);
                    for(let [mApi, pzs] of Object.entries(counts)) {
                        if(norm(mApi).includes(norm(d)) || norm(d).includes(norm(mApi))) {
                            for(let [pApi, q] of Object.entries(pzs)) {
                                let pIdx = listePizzas.findIndex(p => norm(pApi).includes(norm(p)) || norm(p).includes(norm(pApi)));
                                if(pIdx !== -1) document.getElementById(`stock_${mIdx}_${pIdx}`).value = q;
                            }
                        }
                    }
                });
                alert("✅ Synchronisation réussie ! Les pizzas périmées sont ignorées.");
            } catch(e) { 
                console.error(e); alert("❌ Erreur de réseau.");
            }
            btn.innerHTML = "🔄 Synchroniser les stocks Adial"; btn.disabled = false;
        }

        function calculerProductionGlobale() {
            let pT = {}, iT = {}, r = {}, al = [];
            distributeurs.forEach((d, mIdx) => {
                r[d] = {}; let sum = 0;
                listePizzas.forEach((p, pIdx) => {
                    let s = parseInt(document.getElementById(`stock_${mIdx}_${pIdx}`).value) || 0;
                    let o = parseInt(document.getElementById(`obj_${mIdx}_${pIdx}`).value) || 0;
                    localStorage.setItem(`obj_${mIdx}_${pIdx}`, o); sum += o;
                    let diff = Math.max(0, o - s);
                    if(diff > 0) { r[d][p] = diff; pT[p] = (pT[p] || 0) + diff; for(let [ing, g] of Object.entries(recettes[p])) iT[ing] = (iT[ing] || 0) + (g * diff); }
                });
                if(sum > 70) al.push(`⚠️ Surcharge prévue à ${d} : ${sum} pizzas (Maximum 70).`);
            });
            afficherResultats(pT, iT, r, al);
        }

        function afficherResultats(p, ing, r, al) {
            document.getElementById("zone-resultats").style.display = "block";
            let dAl = document.getElementById("zone-alertes"); dAl.innerHTML = al.join("<br>"); dAl.style.display = al.length ? "block" : "none";
            document.getElementById("liste-pizzas-totales").innerHTML = Object.entries(p).map(([n,q]) => `<li>${n} : <span class="highlight">${q}</span></li>`).join("") || "<li>Rien à produire aujourd'hui !</li>";
            let dI = document.getElementById("liste-ingredients"); dI.innerHTML = "";
            let cV = [], cF = [], cD = [], cA = [];
            const mEx = ["sauce", "origan", "miel", "epice", "herbe"];
            const mV = ["boeuf", "allumettes", "merguez", "poulet", "jambon", "saucisses", "viande"];
            const mF = ["roquefort", "emmental", "scalarella", "chèvre", "chevre", "cheddar", "camembert", "comté", "compte", "compté", "reblochon", "boursin"];
            for(let [n, q] of Object.entries(ing)) {
                let nl = n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); if(mEx.some(m => nl.includes(m))) continue;
                let tq = n.includes("(g)") && q >= 1000 ? (q/1000).toFixed(2)+" Kg" : q;
                let li = `<li class="checklist-item"><label><input type="checkbox"><span>${n}: <span class="highlight">${tq}</span></span></label></li>`;
                if(mV.some(m => nl.includes(m))) cV.push(li); else if(mF.some(m => nl.includes(m))) cF.push(li); else if(nl.includes("disque")) cD.push(li); else cA.push(li);
            }
            if(cV.length) dI.innerHTML += `<h4>🥩 Viandes</h4><ul>${cV.join("")}</ul>`;
            if(cF.length) dI.innerHTML += `<h4>🧀 Fromages</h4><ul>${cF.join("")}</ul>`;
            if(cD.length) dI.innerHTML += `<h4>🍕 Disques</h4><ul>${cD.join("")}</ul>`;
            if(cA.length) dI.innerHTML += `<h4>📦 Autre</h4><ul>${cA.join("")}</ul>`;
            document.getElementById("liste-repartition").innerHTML = Object.entries(r).map(([m,l]) => `<div style="background:#f9f9f9;padding:15px;border:1px solid #ddd;margin-bottom:10px;border-radius:4px;"><b>${m}</b><ul style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:5px;margin-top:10px;">${Object.entries(l).map(([pn,pq])=>`<li style="border:none;padding:0;">${pn}: <b>${pq}</b></li>`).join("") || "<li>Distributeur plein</li>"}</ul></div>`).join("");
            document.getElementById("date-production").innerText = "Production du " + new Date().toLocaleDateString();
        }

        function reinitialiserStocks() { if(confirm("Remettre tous les stocks à zéro ?")) { distributeurs.forEach((d, mIdx) => listePizzas.forEach((p, pIdx) => document.getElementById(`stock_${mIdx}_${pIdx}`).value = 0)); document.getElementById("zone-resultats").style.display = "none"; } }
        function imprimerPDF() { window.print(); }
    </script>
</body>
</html>
